base_images:
  acmqe-grc-test:
    name: "2.15"
    namespace: acm-qe
    tag: acmqe-grc-test
  application-ui-test:
    name: "2.15"
    namespace: acm-qe
    tag: application-ui-test
  clc-ui-e2e:
    name: "2.15"
    namespace: acm-qe
    tag: clc-ui-e2e
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  fetch-managed-clusters:
    name: autotest
    namespace: acm-qe
    tag: fetch-managed-clusters
  multicluster-observability-operator-opp:
    name: "2.15"
    namespace: acm-qe
    tag: multicluster-observability-operator-opp
  ocs-ci-tests:
    name: ocs-ci-container
    namespace: ci
    tag: stable
  tests-private:
    name: tests-private
    namespace: ci
    tag: "4.20"
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.20
images:
- dockerfile_literal: |
    FROM this-is-ignored
    RUN dnf install -y git python39
  from: cli
  optional: true
  to: cli-with-git
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: interop-opp-aws
  capabilities:
  - intranet
  cron: 0 23 31 2 *
  steps:
    allow_best_effort_post_steps: true
    cluster_profile: aws-cspi-qe
    env:
      KCFG_SRC_SFX: ftan--external-cluster-ocp
      KUBECONFIG_ORIGIN: vault
    test:
    - ref: acm-tests-clc-create
    - ref: acm-tests-clc-create-try1
    - ref: acm-tests-clc-create-try2
    workflow: external-cluster
zz_generated_metadata:
  branch: main
  org: stolostron
  repo: policy-collection
  variant: ocp4.20
